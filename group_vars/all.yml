---
# ============================================================
# Global variables — shared by every host in the inventory
# ============================================================

# --- Kubernetes version -----------------------------------------
k8s_version: "1.29"
k8s_package_version: "1.29.0-1.1"   # pinned; held by dpkg_selections

# --- Cluster networking -----------------------------------------
pod_network_cidr: "10.244.0.0/16"
service_cidr: "10.96.0.0/12"

# --- Flannel CNI (simple VXLAN, works on AWS out of the box) ----
flannel_manifest_url: "https://raw.githubusercontent.com/flannel-io/flannel/v0.25.1/Documentation/kube-flannel.yml"

# --- Voting Application -----------------------------------------
app_namespace: "voting"
app_repo_url: "https://github.com/dockersamples/example-voting-app.git"
app_repo_dest: "/opt/voting-app"
